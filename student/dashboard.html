<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Terminal — Demo Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root{
            --bg: #f6f8fb;
            --card: #ffffff;
            --muted: #6b7280;
            --accent: #0ea5a0;
            --green: #059669;
            --red: #ef4444;
            --shadow: 0 12px 36px rgba(2,6,23,0.08);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg);
            margin:0; padding:0; 
            color:#0b1220; 
        }
        .live-scan-wrapper.fullscreen {
          position: fixed !important;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          z-index: 99999;
          background: linear-gradient(180deg, #f7fbfd 0%, #ffffff 60%);
          padding: 2rem;
          box-sizing: border-box;
          overflow: hidden;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }
        .live-scan-wrapper.fullscreen::before{
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('../assets/img/logo.png');
            background-repeat: no-repeat;
            background-position: center 30%;
            background-size: 64vmin;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .card { 
            background: var(--card); 
            border-radius: 28px; 
            padding: 3rem; 
            box-shadow: var(--shadow); 
            display: flex; 
            gap: 2rem; 
            align-items: center; 
            width: 90%;
            max-width: 1200px;
            position: relative;
            z-index: 10;
        }
        .avatar {
            width:300px; height:300px; 
            border-radius:20px; 
            object-fit:cover; 
            background:#eef2f6; 
            border:2px solid #e6eef7;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .demo-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f59e0b;
            color: black;
            padding: 5px 15px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 12px;
            z-index: 100000;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .animate-pulse-custom { animation: pulse 2s infinite; }
    </style>
</head>
<body>

<div class="demo-badge">DEMO VERSION</div>

<div class="live-scan-wrapper fullscreen">
    <div id="main-area" class="w-full h-full flex items-center justify-center">
        <!-- Default Idle State -->
        <div id="idle-state" class="flex flex-col items-center gap-6">
            <img src="../assets/img/logo.png" alt="Logo" class="w-64 h-64 opacity-50 mb-4 animate-pulse-custom">
            <div class="text-center">
                <h1 class="text-3xl font-black text-gray-400 uppercase tracking-widest">Waiting for Scan</h1>
                <p class="text-gray-400 mt-2">Place your RFID Tag near the scanner to authenticate</p>
                <div class="mt-8 flex justify-center gap-4">
                    <button onclick="simulateScan()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold transition-all shadow-lg hover:shadow-blue-500/30">
                        SIMULATE SCAN
                    </button>
                    <a href="../index.html" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-full font-bold transition-all">
                        BACK TO LANDING
                    </a>
                </div>
            </div>
        </div>

        <!-- Authenticated State (Hidden initially) -->
        <div id="auth-state" class="hidden card animate-fade-in">
            <img class="avatar" src="https://ui-avatars.com/api/?name=Demo+Student&size=300&background=0D8ABC&color=fff" alt="Student photo">
            <div class="flex-1">
                <div class="text-5xl font-black text-gray-800 mb-2">Demo Student</div>
                <div class="flex items-center gap-3 mb-6">
                    <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg font-bold text-sm">ID: 2025-0001</span>
                    <span class="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full font-bold text-sm">BSIS-4A</span>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <p class="text-xs text-gray-400 font-bold uppercase mb-1">Status</p>
                        <p class="text-emerald-600 font-black">PRESENT (TIME-IN)</p>
                    </div>
                    <div class="flex-1 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <p class="text-xs text-gray-400 font-bold uppercase mb-1">Subject</p>
                        <p class="text-gray-800 font-black">NETWORKING 2</p>
                    </div>
                </div>
            </div>
            <div class="text-right border-l-2 border-gray-100 pl-8 ml-8 min-w-[200px]">
                <p class="text-xs text-gray-400 font-bold uppercase mb-1">Scan Time</p>
                <p id="scan-time" class="text-3xl font-black text-gray-800">08:15:32 AM</p>
                <div class="mt-4 text-xs font-bold text-gray-400">
                    <i class="fas fa-check-circle text-green-500 mr-1"></i> RECORDED
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function simulateScan() {
        document.getElementById('idle-state').classList.add('hidden');
        
        const scanTimeEl = document.getElementById('scan-time');
        const now = new Date();
        scanTimeEl.textContent = now.toLocaleTimeString();

        const authState = document.getElementById('auth-state');
        authState.classList.remove('hidden');
        authState.classList.add('animate-pulse');

        // Reset to idle after 10 seconds
        setTimeout(() => {
            authState.classList.add('hidden');
            document.getElementById('idle-state').classList.remove('hidden');
        }, 10000);
    }
</script>

</body>
</html>
