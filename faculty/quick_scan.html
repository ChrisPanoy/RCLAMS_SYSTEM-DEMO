<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Quick Scan - Demo Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #4f46e5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .pro-header {
            background: var(--primary);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 36px;
            position: fixed;
            top: 0;
            right: 0;
            left: 20rem;
            z-index: 20;
        }

        .glass-sidebar {
            background: #ffffff;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.05);
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 20rem;
            z-index: 10001;
            padding-top: 36px;
            border-right: 1px solid #f1f5f9;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 28px;
            font-weight: 700;
            color: #475569;
            text-decoration: none;
            transition: all 0.2s;
            border-right: 4px solid transparent;
        }

        .sidebar-link.active {
            background: #f0f7ff;
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }

        .sidebar-link:hover:not(.active) {
            background: #f8fafc;
            color: #0f172a;
        }

        .sidebar-link i {
            width: 24px;
            text-align: center;
            font-size: 1.25rem;
        }

        .sidebar-footer {
            margin-top: auto;
            border-top: 1px solid #f1f5f9;
            padding-top: 1rem;
        }

        main {
            margin-left: 20rem;
            padding: 100px 32px 32px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .demo-badge {
            position: fixed;
            top: 90px;
            right: 20px;
            background: #f59e0b;
            color: black;
            padding: 5px 15px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 12px;
            z-index: 60;
        }
    </style>
</head>

<body>

    <div class="demo-badge">DEMO VERSION</div>

    <div id="sidebar" class="glass-sidebar">
        <div class="flex flex-col items-center mb-8 px-2">
            <img src="../assets/img/logo.png" alt="Logo"
                class="w-24 h-24 rounded-full border-4 border-blue-100 shadow-sm mb-4">
            <h2 class="text-xl font-bold text-gray-800">Faculty Panel</h2>
            <p class="text-sm text-gray-500">Dr. Christopher Panoy</p>
        </div>

        <nav class="flex flex-col h-full">
            <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-house"></i>Dashboard</a>
            <a href="quick_scan.html" class="sidebar-link active"><i class="fa-solid fa-qrcode"></i>Quick Scan</a>
            <a href="my_students.html" class="sidebar-link"><i class="fa-solid fa-users"></i>My Students</a>
            <a href="attendance_records.html" class="sidebar-link"><i class="fa-solid fa-clipboard-list"></i>Attendance
                Records</a>
            <a href="my_profile.html" class="sidebar-link"><i class="fa-solid fa-user"></i>My Profile</a>

            <div class="sidebar-footer mt-auto pb-8">
                <a href="../admin/dashboard.html" class="sidebar-link text-blue-600 font-bold"><i
                        class="fa-solid fa-user-shield"></i>Admin Portal</a>
                <a href="../student/dashboard_lab_a.html" class="sidebar-link text-indigo-600 font-bold"><i
                        class="fa-solid fa-desktop"></i>Student Terminal</a>
                <a href="../index.html" class="sidebar-link text-red-600 font-bold mt-4"><i
                        class="fa-solid fa-sign-out-alt"></i>Logout</a>
            </div>
        </nav>
    </div>

    <header class="pro-header">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-white">Quick Class Scan</h1>
        </div>
    </header>

    <main>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
            <div class="card flex flex-col items-center justify-center p-12 text-center">
                <div
                    class="w-32 h-32 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner">
                    <i class="fas fa-qrcode"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Display QR Code</h2>
                <p class="text-gray-500 mb-8">Let students scan this QR code to confirm their presence in the room.</p>
                <button
                    class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition transform hover:scale-105">
                    Generate Class QR
                </button>
            </div>

            <div class="card p-8">
                <h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-4">Scan Settings</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Select
                            Subject</label>
                        <select class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 font-medium">
                            <option>Networking 2 (NET201)</option>
                            <option>Software Engineering (SE402)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Session
                            Type</label>
                        <div class="flex gap-4">
                            <label class="flex-1 border-2 border-blue-600 bg-blue-50 p-4 rounded-xl cursor-pointer">
                                <input type="radio" name="type" class="hidden" checked>
                                <span class="block text-blue-700 font-bold">Regular Class</span>
                            </label>
                            <label
                                class="flex-1 border-2 border-gray-100 p-4 rounded-xl cursor-pointer hover:border-blue-200">
                                <input type="radio" name="type" class="hidden">
                                <span class="block text-gray-600 font-bold">Special Exam</span>
                            </label>
                        </div>
                    </div>
                    <div class="pt-4">
                        <div class="flex items-center gap-2 text-sm text-green-600 font-semibold mb-4">
                            <i class="fas fa-satellite-dish animate-pulse"></i> External scanner online
                        </div>
                        <button class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold shadow-xl">
                            Open Live Feed Terminal
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
